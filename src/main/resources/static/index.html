<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BSB Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BSB Blog</h1>
        <p>Share your thoughts with the world</p>
        <div id="auth-status"></div>
    </header>

    <main>
        <section id="auth-section">
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p id="login-error" class="error"></p>
                <p>No account? <a href="#" id="show-register">Register here</a></p>
            </div>

            <div id="register-form-container" style="display:none;">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="text" id="register-username" placeholder="Choose a username" required>
                    <input type="password" id="register-password" placeholder="Choose a password (min 6 chars)" required>
                    <button type="submit">Register</button>
                </form>
                <p id="register-error" class="error"></p>
                <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
            </div>
        </section>

        <section id="new-post-section" style="display:none;">
            <h2>Create a Post</h2>
            <div class="post-type-tabs">
                <button type="button" class="type-tab active" data-type="BLOG" onclick="switchPostType('BLOG')">Blog</button>
                <button type="button" class="type-tab" data-type="IMAGE" onclick="switchPostType('IMAGE')">Image</button>
                <button type="button" class="type-tab" data-type="POLL" onclick="switchPostType('POLL')">Poll</button>
            </div>

            <form id="blog-post-form" class="post-type-form">
                <input type="text" id="blog-title" placeholder="Post title" required>
                <textarea id="blog-content" placeholder="Write your post here..." rows="4" required></textarea>
                <button type="submit">Publish Blog Post</button>
            </form>

            <form id="image-post-form" class="post-type-form" style="display:none;">
                <input type="file" id="image-file" accept="image/*" required>
                <input type="text" id="image-caption" placeholder="Write a caption (optional)">
                <button type="submit">Publish Image Post</button>
            </form>

            <form id="poll-post-form" class="post-type-form" style="display:none;">
                <input type="text" id="poll-question" placeholder="Ask a question..." required>
                <div id="poll-options-container">
                    <input type="text" class="poll-option-input" placeholder="Option 1" required>
                    <input type="text" class="poll-option-input" placeholder="Option 2" required>
                </div>
                <button type="button" onclick="addPollOption()">+ Add Option</button>
                <label class="checkbox-label">
                    <input type="checkbox" id="poll-multiple"> Allow multiple choice
                </label>
                <button type="submit">Publish Poll</button>
            </form>

            <p id="form-error" class="error"></p>
        </section>

        <section id="posts-section">
            <h2>All Posts</h2>
            <div id="posts-container">
                <p>Loading posts...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
