<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BSB Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BSB Blog</h1>
        <p>Share your thoughts with the world</p>
        <div id="auth-status"></div>
        <nav class="top-nav"><a href="/clubs.html">Browse Clubs</a></nav>
    </header>

    <main>
        <section id="auth-section">
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p id="login-error" class="error"></p>
                <p>No account? <a href="#" id="show-register">Register here</a></p>
            </div>

            <div id="register-form-container" style="display:none;">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="text" id="register-username" placeholder="Choose a username" required>
                    <input type="password" id="register-password" placeholder="Choose a password (min 6 chars)" required>
                    <button type="submit">Register</button>
                </form>
                <p id="register-error" class="error"></p>
                <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
            </div>
        </section>

        <section id="new-post-section" style="display:none;">
            <h2>Write a New Post</h2>
            <form id="post-form">
                <input type="text" id="title" placeholder="Post title" required>
                <textarea id="content" placeholder="Write your post here..." rows="4" required></textarea>
                <button type="submit">Publish Post</button>
            </form>
            <p id="form-error" class="error"></p>
        </section>

        <section id="posts-section">
            <h2>All Posts</h2>
            <div id="posts-container">
                <p>Loading posts...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
