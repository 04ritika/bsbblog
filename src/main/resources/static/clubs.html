<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clubs — BSB Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Explore Clubs</h1>
        <p>Find your community</p>
        <nav class="top-nav">
            <a href="/">Back to Feed</a>
        </nav>
    </header>

    <main>
        <section id="category-filter-section">
            <div id="category-filters">
                <button class="category-btn active" data-category="all" onclick="filterByCategory('all')">All</button>
            </div>
        </section>

        <section id="clubs-by-category">
            <p>Loading clubs...</p>
        </section>
    </main>

    <div id="club-modal" class="modal-overlay" style="display:none;" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="club-modal-body"></div>
        </div>
    </div>

    <script src="clubs.js"></script>
</body>
</html>
